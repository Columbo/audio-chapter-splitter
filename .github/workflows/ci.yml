name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -r requirements.txt
          python -m pip install .

      - name: Verify direct dependencies are represented in requirements.txt
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path
          
          data = tomllib.loads(Path("pyproject.toml").read_text())
          declared = data["project"]["dependencies"] + data["project"]["optional-dependencies"]["docs"]
          
          def package_name(spec):
              return re.split(r"[<>=!~;\\s\\[]", spec, maxsplit=1)[0].lower().replace("_", "-")
          
          pinned = set()
          for line in Path("requirements.txt").read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              pinned.add(package_name(line))
          
          missing = sorted(name for name in (package_name(spec) for spec in declared) if name not in pinned)
          if missing:
              raise SystemExit(
                  "requirements.txt is missing direct dependencies declared in pyproject.toml: "
                  + ", ".join(missing)
              )
          PY

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build package
        run: python -m build
